video:
  sample_fps: 5
  output_dir: "examples/outputs"

sampling:
  strategy: "fixed_fps"
  save_images: true
  image_format: "jpg"

detection:
  model_name: "yolov8n.pt"
  confidence_threshold: 0.4
  target_classes:
    - person
    # - tree
    - car
    - bicycle
    - bus
    # - motorcycle
    - truck

temporal:
  max_gap_seconds: 1.5
  min_segment_duration_seconds: 1
  min_evidence_frames: 2

events:
  enabled_event_types:
    - person_present
    - vehicle_present
    - multiple_people_present
    - person_near_vehicle
  
  vehicle_classes:
    - car
    - bus
    - truck
    - motorcycle
    - bicycle
  
  min_event_duration_seconds: 0.5
  min_evidence_frames: 2
  person_vehicle_distance_threshold_pixels: 400

    