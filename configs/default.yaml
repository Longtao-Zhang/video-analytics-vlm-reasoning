video:
  sample_fps: 0.5
  output_dir: "examples/outputs"

sampling:
  strategy: "fixed_fps"
  save_images: true
  image_format: "jpg"

detection:
  model_name: "yolov8n.pt"
  confidence_threshold: 0.4
  target_classes:
    - person
    # - tree
    - car
    - bicycle
    - bus
    # - motorcycle
    - truck
    